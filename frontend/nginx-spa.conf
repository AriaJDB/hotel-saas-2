# nginx-spa.conf
# Configuración para servir una Single Page App (React con React Router)

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas que no sean archivos reales → index.html
    # Necesario para que React Router funcione (ej: /dashboard, /login, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de archivos estáticos (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compresión gzip para respuestas más rápidas
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
