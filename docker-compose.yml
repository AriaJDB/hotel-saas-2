

services:

  #Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotelflow-frontend
    restart: unless-stopped
    networks:
      - app-network

  #Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./keys.json:/keys.json:ro
    networks:
      - app-network

  #Nginx (Proxy inverso con SSL)
  nginx:
    image: nginx:alpine
    container_name: hotelflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
